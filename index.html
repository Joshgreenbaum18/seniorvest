  const [sp,setSp] = useState(1500000);

  const gain = Math.max(0,sp-ba);

  const ltcg = Math.max(0,gain-dRec);
  const totTax = dRec*0.25 + ltcg*((fed+st+(niit?3.8:0))/100);
  const net = sp-totTax;
  const inc1 = sp*(ty/100), inc2 = net*(ty/100);

          {mode==="1031" && <Btn onClick={()=>document.getElementById("why1031").scrollIntoView({behavior:"smooth"})} style={{fontSize:14,padding:"13px 26px"}}>1031 Exchange Guide</Btn>}
        </div>
        {/* Stats bar */}
        <div className="a4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,maxWidth:840,width:"100%",background:"rgba(200,169,110,0.1)",borderRadius:16,overflow:"hidden",border:"1px solid rgba(200,169,110,0.15)"}}>
          {[{v:"$284M",l:"Exchange Equity Deployed",s:"across 47 facilities"},{v:"6.4%",l:"Avg. Cash Yield",s:"annualized distributions"},{v:"18,400+",l:"Investors",s:"1031 & direct combined"},{v:"91.2%",l:"Portfolio Occupancy",s:"above national average"}].map((s,i)=>(
            <div key={i} style={{background:"#070f16",padding:"20px 14px",textAlign:"center"}}>
              <div style={{fontSize:24,fontWeight:700,fontFamily:"'Cormorant Garamond',serif",color:"#c8a96e"}}>{s.v}</div>
              <div style={{fontSize:11,fontWeight:600,color:"#b4b0a8",marginTop:3}}>{s.l}</div>
              <div style={{fontSize:9,color:"#2a3a42",marginTop:2}}>{s.s}</div>
            </div>
          ))}
        </div>
      </section>

      {/* WHY 1031 */}
      <section id="why1031" style={{padding:"80px 40px",background:"radial-gradient(ellipse 80% 55% at 50% 50%, rgba(200,169,110,0.05) 0%, transparent 70%)"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:48}}>
            <div style={{fontSize:11,color:"#c8a96e",textTransform:"uppercase",letterSpacing:".1em",fontWeight:700,marginBottom:8}}>The Core Strategy</div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:700,color:"#f0ece3",marginBottom:10}}>Why 1031 + Senior Living Works</h2>
            <p style={{color:"#4a5a65",fontSize:14,maxWidth:520,margin:"0 auto"}}>Senior care offers bond-like income from essential services — an ideal passive replacement for active real estate investors.</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16,marginBottom:20}}>
            {[{icon:"⟳",t:"Defer Capital Gains Indefinitely",c:"#c8a96e",d:"Exchange into a TIC interest and defer federal + state capital gains today. Re-exchange at exit, or step up at death — potentially eliminating the gain for heirs entirely."},{icon:"🏛️",t:"Institutional, Recession-Resilient Asset",c:"#6bba7f",d:"Senior living is government-reimbursed, demand is structurally growing (10,000 Boomers turn 65 daily), and replacement costs are high."},{icon:"📄",t:"Deeded TIC = True Like-Kind Property",c:"#5b9fc8",d:"Unlike DSTs (securities), TIC interests are direct real property deeds. Preserves your right to re-exchange, participate in refinancing votes, and exit on your own terms."},{icon:"💵",t:"100% Passive — Zero Landlord Duties",c:"#9b7fdf",d:"Triple-net and RIDEA leases mean licensed operators handle all staffing, licensing, and compliance. Receive quarterly distributions without a single maintenance call."}].map(c=>(
              <div key={c.t} style={{background:"rgba(255,255,255,0.022)",border:`1px solid ${c.c}1a`,borderRadius:14,padding:"24px 26px",display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{fontSize:26,flexShrink:0,marginTop:2}}>{c.icon}</div>
                <div><div style={{fontSize:15,fontWeight:700,color:c.c,marginBottom:7}}>{c.t}</div><div style={{fontSize:13,color:"#5a6a75",lineHeight:1.75}}>{c.d}</div></div>
              </div>
            ))}
          </div>
          <div style={{background:"rgba(200,169,110,0.03)",border:"1px solid rgba(200,169,110,0.15)",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:"13px 22px",borderBottom:"1px solid rgba(200,169,110,0.1)",fontSize:10,fontWeight:700,color:"#c8a96e",letterSpacing:".06em",textTransform:"uppercase"}}>TIC vs. DST — Why We Use TIC</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",fontSize:12,overflowX:"auto"}}>
              {[["Feature","TIC (SeniorVest)","DST"],["Qualifies for §1031","✓ Yes","✓ Yes"],["Direct deeded ownership","✓ Yes","✗ Beneficial interest"],["Re-exchange at exit","✓ Yes","✗ Not permitted"],["Refinancing input","✓ Co-owner vote","✗ Sponsor controlled"],["Depreciation pass-through","✓ Pro-rata","✓ Pro-rata"],["Classified as security","✗ Real property","✓ Reg D"]].map((row,ri)=>
                row.map((cell,ci)=>(
                  <div key={`${ri}-${ci}`} style={{padding:"10px 16px",background:ri===0?"rgba(0,0,0,0.25)":ri%2===0?"rgba(255,255,255,0.01)":"transparent",borderBottom:"1px solid rgba(200,169,110,0.06)",color:ri===0?"#5a6a75":ci===1?"#6bba7f":ci===2?"#7a5a5a":"#6a7a85",fontWeight:ri===0?600:ci===0?500:400,fontSize:ri===0?9:12,textTransform:ri===0?"uppercase":"none",letterSpacing:ri===0?".07em":0}}>{cell}</div>
                ))
              )}
            </div>
          </div>
        </div>
      </section>

      {/* TAX CALC */}
      <section style={{padding:"0 40px 80px"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{fontSize:11,color:"#c8a96e",textTransform:"uppercase",letterSpacing:".1em",fontWeight:700,marginBottom:8}}>Interactive Tool</div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,color:"#f0ece3"}}>How Much Can You Preserve?</h2>
          </div>
          <MarketingCalc onPortal={onPortal}/>
        </div>
      </section>

      {/* HOW IT WORKS */}
      <section style={{padding:"0 40px 80px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:44}}>
            <div style={{fontSize:11,color:"#c8a96e",textTransform:"uppercase",letterSpacing:".1em",fontWeight:700,marginBottom:8}}>The Process</div>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:40,fontWeight:700,color:"#f0ece3"}}>Two Paths, One Platform</h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:20}}>
            {[{lbl:"⟳ 1031 EXCHANGE PATH · PRIMARY",clr:"#c8a96e",bg:"rgba(200,169,110,0.06)",bdr:"rgba(200,169,110,0.22)",steps:[{n:"1",t:"Close Your Relinquished Property",d:"Your QI holds exchange proceeds. 45-day ID clock starts at closing."},{n:"2",t:"Identify SeniorVest as Replacement",d:"Identify a TIC interest within 45 days. We provide ID letters and QI coordination."},{n:"3",t:"Execute TIC Closing via QI",d:"Exchange funds wire from QI to escrow. TIC deed recorded — 180-day window satisfied."},{n:"4",t:"Earn Passive Quarterly Distributions",d:"100% of exchange equity preserved. Re-exchange at exit to continue deferral indefinitely."}],tip:null},
             {lbl:"💵 DIRECT INVESTMENT PATH · WELCOME",clr:"#5b9fc8",bg:"rgba(91,143,168,0.055)",bdr:"rgba(91,143,168,0.18)",steps:[{n:"1",t:"Browse All Open Properties",d:"Every SeniorVest offering accepts direct capital alongside 1031 co-owners."},{n:"2",t:"Verify Accredited Investor Status",d:"Complete secure accreditation verification online in ~10 minutes."},{n:"3",t:"Fund & Receive Your TIC Deed",d:"Wire funds to escrow. Receive your deeded fractional ownership at closing."},{n:"4",t:"Collect Income + Depreciation Pass-Through",d:"Earn pro-rata distributions and K-1 depreciation alongside 1031 co-owners."}],tip:"💡 At exit, direct investors may execute their own 1031 exchange — starting your deferral journey."}
            ].map(path=>(
              <div key={path.lbl} style={{background:`linear-gradient(180deg,${path.bg} 0%,rgba(0,0,0,0) 100%)`,border:`1px solid ${path.bdr}`,borderRadius:20,padding:"26px 24px"}}>
                <div style={{background:`${path.clr}20`,borderRadius:9,padding:"6px 13px",fontSize:10,fontWeight:700,color:path.clr,letterSpacing:".05em",display:"inline-block",marginBottom:20}}>{path.lbl}</div>
                {path.steps.map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:13,marginBottom:i<3?16:0}}>
                    <div style={{flexShrink:0}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:`${path.clr}15`,border:`1px solid ${path.clr}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:path.clr}}>{s.n}</div>
                      {i<3 && <div style={{width:1,height:14,background:`${path.clr}15`,margin:"3px auto"}}/>}
                    </div>
                    <div style={{paddingTop:3}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#e8e4dc",marginBottom:3}}>{s.t}</div>
                      <div style={{fontSize:12,color:"#4a5a65",lineHeight:1.65}}>{s.d}</div>
                    </div>
                  </div>
                ))}
                {path.tip && <div style={{marginTop:18,padding:"10px 13px",background:"rgba(91,143,168,0.06)",border:"1px solid rgba(91,143,168,0.14)",borderRadius:8,fontSize:11,color:"#4a6a7a",lineHeight:1.65}}>{path.tip}</div>}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* PROPERTIES */}
      <section id="properties" style={{padding:"0 40px 80px",maxWidth:1200,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:11,color:"#c8a96e",textTransform:"uppercase",letterSpacing:".1em",fontWeight:700,marginBottom:8}}>Available Offerings</div>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:40,fontWeight:700,color:"#f0ece3"}}>Current Properties</h2>
          <p style={{color:"#3a4a50",marginTop:10,fontSize:13}}>All properties accept both 1031 exchange and direct investment. 60-day due diligence: CMS audit, operator financial review, market analysis.</p>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:mode==="1031"?"rgba(200,169,110,0.05)":"rgba(91,143,168,0.05)",border:`1px solid ${mode==="1031"?"rgba(200,169,110,0.18)":"rgba(91,143,168,0.18)"}`,borderRadius:10,padding:"10px 16px",marginBottom:20,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:12,color:mode==="1031"?"#c8a96e":"#5b9fc8",fontWeight:600}}>{mode==="1031"?"⟳ 1031 view — minimums reflect exchange equity requirements":"💵 Direct view — minimums reflect cash requirements"}</div>
          <button onClick={()=>setMode(mode==="1031"?"cash":"1031")} style={{background:"transparent",border:`1px solid ${mode==="1031"?"rgba(200,169,110,0.25)":"rgba(91,143,168,0.25)"}`,borderRadius:7,color:mode==="1031"?"#c8a96e":"#5b9fc8",fontSize:10,fontWeight:600,padding:"5px 11px",cursor:"pointer"}}>Switch to {mode==="1031"?"Direct View":"1031 View"}</button>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",justifyContent:"center",marginBottom:26}}>
          {LISTING_TYPES.map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"linear-gradient(135deg,#c8a96e,#a87c48)":"rgba(255,255,255,0.035)",border:filter===f?"none":"1px solid rgba(255,255,255,0.07)",color:filter===f?"#0d1410":"#5a6a75",padding:"7px 14px",borderRadius:30,fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>{f}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
          {listings.map(p=><ListingCard key={p.id} p={p} mode={mode} onOpen={setSel}/>)}
        </div>
      </section>

      {/* FAQ */}
      <section style={{padding:"0 40px 80px",maxWidth:820,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:30}}><h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,color:"#f0ece3"}}>Common Questions</h2></div>
        <div style={{display:"flex",gap:5,marginBottom:20,background:"rgba(255,255,255,0.025)",borderRadius:12,padding:4}}>
          {[["1031","⟳ 1031 Exchange Investors"],["cash","💵 Direct Investors"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFaqTab(k)} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:faqTab===k?(k==="1031"?"rgba(200,169,110,0.14)":"rgba(91,143,168,0.14)"):"transparent",color:faqTab===k?(k==="1031"?"#c8a96e":"#5b9fc8"):"#3a4a50",transition:"all .2s"}}>{l}</button>
          ))}
        </div>
        {(faqTab==="1031"?FAQS_1031:FAQS_CASH).map((f,i)=><FAQItem key={i} q={f.q} a={f.a}/>)}
      </section>

      {/* CTA */}
      <section style={{padding:"60px 40px 80px",background:"radial-gradient(ellipse 70% 80% at 50% 50%, rgba(200,169,110,0.07) 0%, transparent 70%)",textAlign:"center"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(200,169,110,0.08)",border:"1px solid rgba(200,169,110,0.18)",borderRadius:30,padding:"5px 16px",fontSize:10,color:"#c8a96e",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:18,animation:"floatBadge 3s ease infinite"}}>
          <span style={{animation:"pulse 2s infinite"}}>●</span> Accepting 1031 Exchange & Direct Investors Now
        </div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:44,fontWeight:700,color:"#f0ece3",marginBottom:12}}>{mode==="1031"?"Your 45-Day Clock Is Ticking.":"Start Building Passive Income."}</h2>
        <p style={{color:"#4a5a60",maxWidth:440,margin:"0 auto 28px",lineHeight:1.8,fontSize:14}}>{mode==="1031"?"SeniorVest properties are ready to close. Identify your 1031 replacement property today and preserve your capital gains.":"Join thousands of investors earning passive income from essential senior care. No exchange required."}</p>
        <div style={{display:"flex",gap:9,justifyContent:"center",maxWidth:400,margin:"0 auto 14px"}}>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Enter your email" style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(200,169,110,0.2)",borderRadius:9,color:"#d4d0c8",padding:"12px 15px",fontSize:13,outline:"none"}}/>
          <button onClick={()=>{if(email)setSubmitted(true);}} style={{background:"linear-gradient(135deg,#c8a96e,#a87c48)",border:"none",borderRadius:9,color:"#0d1410",fontWeight:700,fontSize:13,padding:"12px 20px",cursor:"pointer"}}>{submitted?"✓ Joined":"Get Access"}</button>
        </div>
        <div style={{fontSize:10,color:"#1e2e36"}}>For accredited investors only · No spam · Unsubscribe anytime</div>
      </section>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid rgba(200,169,110,0.08)",padding:"30px 40px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
        <div>
          <Logo/>
          <div style={{fontSize:9,color:"#1e2e36",marginTop:6,maxWidth:380,lineHeight:1.65}}>Securities offered through registered broker-dealer, member FINRA/SIPC. Not an offer to sell securities. For accredited investors only. Consult your QI and tax advisor before executing a 1031 exchange.</div>
        </div>
        <div style={{display:"flex",gap:20,fontSize:11,color:"#2a3a40",flexWrap:"wrap"}}>
          {["Properties","1031 Exchange","How It Works","Portal","Privacy","Terms"].map(l=>(
            <span key={l} style={{cursor:"pointer",transition:"color .2s"}} onClick={l==="Portal"?onPortal:undefined} onMouseEnter={e=>e.target.style.color="#c8a96e"} onMouseLeave={e=>e.target.style.color="#2a3a40"}>{l}</span>
          ))}
        </div>
      </footer>

      <ListingModal p={sel} mode={mode} onClose={()=>setSel(null)}/>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────

function App() {
  const [view,setView] = useState("marketing");
  if (view==="portal") return <Portal onBack={()=>setView("marketing")}/>;
  return <Marketing onPortal={()=>setView("portal")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
